<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TucuChess — Ejercicio</title>
    <link rel="icon" type="image/png" href="./images/mascot.png" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body class="exercise-page">
    <header class="site-header">
      <a href="./index.html" class="logo-link">
        <img src="./images/mascot.png" alt="TucuChess" class="mascot-logo" />
      </a>
      <div class="header-right">
        <settings-menu show-theme></settings-menu>
      </div>
    </header>

    <main class="exercise-main">
      <div class="exercise-layout">
        <!-- Board column -->
        <div class="board-column">
          <div class="exercise-meta">
            <span class="exercise-number" id="exercise-number"></span>
            <h1 class="exercise-title" id="exercise-title"></h1>
          </div>
          <p class="to-move-label" id="to-move-label"></p>
          <div id="board-wrap">
            <div id="board"></div>
          </div>
          <div class="board-meta-row">
            <div class="game-ref" id="game-ref"></div>
            <button id="rotate-board-btn" class="icon-btn" type="button">
              <span class="icon-btn-label" id="rotate-board-label">Rotar</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                <path d="M21 3v5h-5" />
              </svg>
            </button>
          </div>
          <div class="board-controls">
            <button id="prev-btn" class="nav-btn" data-i18n="prev">
              Anterior
            </button>
            <button id="reset-btn" class="action-btn" data-i18n="reset" disabled>
              Reiniciar
            </button>
            <button id="next-btn" class="nav-btn" data-i18n="next">
              Siguiente
            </button>
          </div>
        </div>

        <!-- Info column -->
        <div class="info-column">
          <details id="fen-details" class="fen-details">
            <summary class="fen-summary">
              <span data-i18n="fenLabel">FEN</span>
              <svg
                class="fen-chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
            </summary>
            <button type="button" id="fen-box" class="fen-box">
              <code id="fen-value"></code>
              <svg
                class="fen-copy-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
              </svg>
            </button>
          </details>

          <div class="panel-buttons" id="panel-buttons">
            <button
              id="hint-btn"
              class="solution-btn"
              data-i18n="showHint"
            >
              Ver pista
            </button>
            <button
              id="solution-btn"
              class="solution-btn"
              data-i18n="showSolution"
            >
              Ver solución
            </button>
          </div>

          <div id="hint-panel" class="solution-panel" hidden>
            <h3 data-i18n="hintLabel">Pista</h3>
            <p class="hint-text" id="hint-text"></p>
          </div>

          <div id="solution-panel" class="solution-panel" hidden>
            <h3 data-i18n="solutionLabel">Solución</h3>
            <div class="solution-text" id="solution-text"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast" aria-live="polite">
      <img id="toast-img" src="" alt="" />
    </div>

    <!-- Copy toast -->
    <div id="copy-toast" class="copy-toast" role="status" aria-live="polite"></div>

    <script type="module" src="./src/exercise.js"></script>
  </body>
</html>
